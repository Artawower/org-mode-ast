name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun run test:silent
      - name: Build
        run: bun run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  release:
    name: Create Release
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check package version change
        id: version_change
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git cat-file -e "$BEFORE:package.json" 2>/dev/null; then
            PREV_VERSION=$(git show "$BEFORE:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          else
            PREV_VERSION=""
          fi
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Previous: $PREV_VERSION, Current: $CURRENT_VERSION"
          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=false" >> "$GITHUB_OUTPUT"
      - name: Check release existence
        id: check_release
        if: steps.version_change.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "should_create=false" >> "$GITHUB_OUTPUT"
            echo "Release $VERSION already exists, skipping"
            exit 0
          fi
          echo "should_create=true" >> "$GITHUB_OUTPUT"
      - name: Create release
        if: >-
          steps.version_change.outputs.changed == 'true' &&
          steps.check_release.outputs.should_create == 'true'
        uses: justincy/github-action-npm-release@2.0.2
        with:
          token: ${{ github.token }}
